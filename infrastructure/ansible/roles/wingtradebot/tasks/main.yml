---
# Role: wingtradebot — Deploy using Docker containers from GHCR

# ─── Directory Setup ─────────────────────────────────────────────────────────────
- name: Ensure app directory exists
  file:
    path: "{{ app_dir }}"
    state: directory
    mode: "0755"

# ─── Environment Configuration ─────────────────────────────────────────────────
- name: Create .env file from template
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    mode: "0600"
  notify: Restart wingtradebot

# ─── Docker Compose Setup ───────────────────────────────────────────────────────
- name: Create docker-compose.yml for the app
  template:
    src: docker-compose.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart wingtradebot

# ─── SSL Setup ─────────────────────────────────────────────────────────────────
- name: Create app ssl directory
  file:
    path: "{{ app_dir }}/ssl"
    state: directory
    mode: "0700"

- name: Copy SSL certificate to server (if exists locally)
  copy:
    src: "{{ playbook_dir }}/../../ssl/cert.pem"
    dest: "{{ app_dir }}/ssl/cert.pem"
    mode: "0600"
  ignore_errors: true
  notify: Restart wingtradebot

- name: Copy SSL private key to server (if exists locally)
  copy:
    src: "{{ playbook_dir }}/../../ssl/key.pem"
    dest: "{{ app_dir }}/ssl/key.pem"
    mode: "0600"
  ignore_errors: true
  notify: Restart wingtradebot

# ─── Pull Docker Images ─────────────────────────────────────────────────────────
- name: Pull latest Docker image
  community.docker.docker_image:
    name: "{{ docker_image_core }}"
    tag: latest
    source: pull
  ignore_errors: yes

- name: Pull FastAPI Docker image
  community.docker.docker_image:
    name: "{{ docker_image_fastapi }}"
    tag: latest
    source: pull
  ignore_errors: yes

# ─── Start Containers ───────────────────────────────────────────────────────────
- name: Start containers using docker-compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files:
      - docker-compose.yml
    state: present
  notify: Restart wingtradebot

# ─── Handlers ───────────────────────────────────────────────────────────────────
handlers:
  - name: Restart wingtradebot
    community.docker.docker_compose_v2:
      project_src: "{{ app_dir }}"
      files:
        - docker-compose.yml
      state: restarted
