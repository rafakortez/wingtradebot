name: CI/CD Pipeline - WingTradeBot

# 1. TRIGGERS: When will this run?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. JOBS: The tasks we will execute
jobs:
  # ─── Job 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    # GitHub spins up the latest Ubuntu machine in their cloud for us:
    runs-on: ubuntu-latest

    # 3. STEPS: The sequence of commands the GitHub runner will execute
    steps:
      # Step 1: GitHub doesn't have your code yet. This action "pulls" your code to their server.
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: The Ubuntu runner is bare. We need to install Node.js.
      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Stable Node version
          cache: 'npm'       # Caches packages to speed up future pipeline runs

      # Step 3: Now that we have Node and Code, install the packages.
      # We use npm ci (clean install) because it strictly follows package-lock.json, ideal for CI/CD.
      - name: Install Dependencies
        run: npm ci

      # Step 3.5: Since we ignore src/config.ts for security, TypeScript needs it (or the example) to compile
      # The config.example.ts now reads from process.env — no hardcoded secrets
      - name: Setup Config from Example
        run: cp src/config.example.ts src/config.ts

      # Step 4 (Linter Checks): Since we use TypeScript, ensure it compiles without errors
      - name: Validate TypeScript (Linter / Build Check)
        run: npx tsc --noEmit

      # Step 5: Run the tests we wrote! Unit and Integration tests
      - name: Run Unit Tests & Container/DB Tests
        run: npm test

      # Step 6: Create the Docker image proving that the Dockerfile works
      - name: Build Docker Image
        run: docker build -t wingtradebot:test .

  # ─── Job 2: Push Images to GHCR (only on push to main) ─────────────────────
  # LEARNING: This job demonstrates CI/CD artifact management.
  # Secrets are stored in GitHub Settings > Secrets and Variables > Actions.
  # They are injected as environment variables — NEVER hardcoded in this file.
  push_images:
    name: Push Docker Images to GHCR
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only push on direct push to main (not on pull requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Grant permission to push to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # LEARNING: docker/login-action reads GITHUB_TOKEN automatically.
      # GITHUB_TOKEN is a special secret GitHub injects into every workflow run.
      # You never need to create it — it's always available.
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the Node.js core image
      # Image name: ghcr.io/<your-github-username>/wingtradebot-core:latest
      - name: Build and Push Node.js Core Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wingtradebot-core:latest
            ghcr.io/${{ github.repository_owner }}/wingtradebot-core:${{ github.sha }}

      # Build and push the FastAPI image
      # IMPORTANT: context must be '.' (project root) because the Dockerfile
      # copies the shared/ directory which is at the root level.
      - name: Build and Push FastAPI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/fastapi_service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wingtradebot-fastapi:latest
            ghcr.io/${{ github.repository_owner }}/wingtradebot-fastapi:${{ github.sha }}

  # ─── Job 3: Terraform Plan (validate IaC on every PR and push to main) ──────────────────────
  # LEARNING: This job shows how CI/CD validates infrastructure changes.
  # Secrets are stored in GitHub Settings > Secrets and Variables > Actions.
  # They map to Terraform variables via TF_VAR_* environment variables.
  # NO terraform.tfvars file is needed — secrets come from GitHub Secrets.
  terraform_validate:
    name: Validate Terraform (${{ matrix.cloud }})
    needs: build-and-test
    runs-on: ubuntu-latest
    # Run on PRs and on push to main
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: aws
            dir: infrastructure/terraform/aws
          - cloud: gcp
            dir: infrastructure/terraform/gcp
          - cloud: azure
            dir: infrastructure/terraform/azure

    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        run: terraform init -backend=false  # No state backend needed for validation

      - name: Terraform Validate
        run: terraform validate
        # LEARNING: 'terraform validate' checks syntax and internal consistency.
        # It does NOT connect to the cloud provider — no credentials needed for this step.

      # LEARNING: 'terraform plan' DOES connect to AWS and shows what would change.
      # Credentials are injected via TF_VAR_* environment variables from GitHub Secrets.
      # To enable this step, add these secrets in GitHub Settings > Secrets:
      #   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, TF_VAR_db_password, TF_VAR_ssh_public_key
      #
      # - name: Terraform Plan (requires AWS secrets)
      #   env:
      #     TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
      #     TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      #     TF_VAR_migration_tool_ip: "0.0.0.0/0"
      #   run: terraform plan -no-color
